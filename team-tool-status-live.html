<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #f0f4f8; min-height: 100vh; padding: 20px;
}
.header { background: #0d7c6e; color: white; border-radius: 16px; padding: 20px 24px; margin-bottom: 12px; }
.header h1 { font-size: 1.3rem; font-weight: 700; }
.header .time { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }
.tabs { display:flex; gap:8px; margin-bottom:16px; }
.tab-btn {
  flex:1; padding:12px; border-radius:12px; border:2px solid #e2e6ea;
  background:white; font-size:0.95rem; font-weight:700; cursor:pointer; color:#555; transition:all 0.2s;
}
.tab-btn.active { background:#0d7c6e; border-color:#0d7c6e; color:white; }
.card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h2 { font-size: 0.95rem; color: #555; margin-bottom: 12px; font-weight: 600; }
.name-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
.name-btn {
  padding: 10px 20px; border-radius: 100px; border: 2px solid #e2e6ea;
  background: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #444; transition: all 0.2s;
}
.name-btn.selected { background: #0d7c6e; border-color: #0d7c6e; color: white; }
.tool-group { margin-bottom: 14px; }
.tool-group-label { font-size: 0.78rem; font-weight: 700; color: #888; margin-bottom: 6px; padding-left: 2px; letter-spacing: 0.5px; }
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
.tool-btn {
  padding: 12px 8px; border-radius: 12px; border: 2px solid #e2e6ea;
  background: white; font-size: 1rem; font-weight: 700; cursor: pointer; color: #444;
  text-align: center; transition: all 0.2s; min-height: 48px;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.tool-btn.selected { background: #e6f7f4; border-color: #0d7c6e; color: #0d7c6e; }
.tool-btn.used-by-other { background: #f5f5f5; border-color: #ddd; color: #bbb; cursor: not-allowed; opacity: 0.6; }
.submit-btn {
  width: 100%; padding: 16px; background: #0d7c6e; color: white; border: none;
  border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
  margin-bottom: 16px; transition: background 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.submit-btn:hover { background: #0a6458; }
.submit-btn:disabled { background: #ccc; cursor: not-allowed; }
.reset-btn {
  width: 100%; padding: 12px; background: #fff0f0; color: #e53e3e; border: none;
  border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-bottom: 16px;
}
.reset-btn:hover { background: #ffe0e0; }
.member-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.member-row:last-child { border-bottom: none; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%; background: #0d7c6e; color: white;
  font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.member-name { font-weight: 700; font-size: 0.95rem; color: #222; margin-bottom: 6px; }
.tool-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tool-tag { background: #e6f7f4; color: #0d7c6e; border-radius: 100px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; }
.no-tool { color: #bbb; font-size: 0.85rem; }
.guide {
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
  padding: 12px 16px; font-size: 0.82rem; color: #92400e; margin-bottom: 16px; line-height: 1.6;
}
.log-refresh-btn {
  width:100%; padding:12px; background:#f0f4f8; color:#555; border:none;
  border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer; margin-bottom:12px;

.log-refresh-btn:hover { background:#e2e6ea; }
.log-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
.log-table th { background:#f0f4f8; padding:10px 8px; text-align:left; font-weight:700; color:#555; border-bottom:2px solid #e2e6ea; }
.log-table td { padding:10px 8px; border-bottom:1px solid #f0f0f0; color:#333; vertical-align:middle; }
.log-table tr:last-child td { border-bottom:none; }
.log-tool-tag { background:#e6f7f4; color:#0d7c6e; border-radius:100px; padding:2px 8px; font-size:0.78rem; font-weight:600; display:inline-block; margin:2px; }
.log-empty { text-align:center; color:#bbb; padding:30px; font-size:0.9rem; }
.loading { text-align:center; color:#999; padding:30px; font-size:0.9rem; }
.info-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
.info-table th { background:#f0f4f8; padding:10px 8px; text-align:left; font-weight:700; color:#555; border-bottom:2px solid #e2e6ea; white-space:nowrap; }
.info-table td { padding:10px 8px; border-bottom:1px solid #f0f0f0; color:#333; vertical-align:middle; }
.info-table tr:last-child td { border-bottom:none; }
.expired { color:#e53e3e; font-weight:700; }
.expiring-soon { color:#d97706; font-weight:700; }
.valid { color:#0d7c6e; font-weight:700; }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e6ea; border-top-color: #0d7c6e; border-radius: 50%; animation: spin 0.7s linear infinite; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #222; color: white; padding: 12px 24px; border-radius: 100px;
  font-size: 0.9rem; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (tab==='main'&&i===0)||(tab==='info'&&i===1)||(tab==='log'&&i===2))

  document.getElementById('mainSection').style.display = tab==='main' ? 'block' : 'none';

  document.getElementById('infoSection').style.display = tab==='info' ? 'block' : 'none';

}

  const toggleBtn = `<button
    class="name-btn"
    style="background:#f0f4f8;border-color:#ddd;color:#888;font-size:0.85rem"
    onclick="showExtra=!showExtra;renderNames()">
    ${showExtra ? "▲ 접기" : "▼ 더보기..."}
  </button>`;

  const statusBtns = STATUS_MEMBERS.map(m =>
    `<button class="name-btn ${myName===m?"selected":""}" onclick="selectName('${m}')">${m}</button>`
  ).join("");

  document.getElementById("nameButtons").innerHTML = mainBtns + toggleBtn + extraBtns + `<br style="width:100%">` + statusBtns;
  }

function selectName(name) {
  myName = name;
  myTools = [...(boardData[name] || [])];
  renderNames();
  renderTools();
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("returnBtn").disabled = false;
}

function renderTools() {
  const usedByOthers = {};
  ALL_MEMBERS.forEach(m => {
    if (m === myName) return;
    (boardData[m] || []).forEach(t => { usedByOthers[t] = m; });
  });

  document.getElementById("toolsGrid").innerHTML = TOOL_GROUPS.map(group => `
    <div class="tool-group">
      <div class="tool-group-label">${group.label}</div>
      <div class="tools-grid">
        ${group.tools.map(t => {
          const other = usedByOthers[t];
          const isSelected = myTools.includes(t);
          const isUsed = other && !isSelected;
          return `<button
            class="tool-btn ${isSelected?'selected':''} ${isUsed?'used-by-other':''}"
            onclick="toggleTool('${t}')"
            ${isUsed?'disabled':''}
            title="${isUsed?other+' 사용 중':''}"
          >${t}${isUsed?`<br><span style="font-size:0.65rem;font-weight:400">${other}</span>`:''}</button>`;
        }).join("")}
      </div>
    </div>
  `).join("");
}

function toggleTool(tool) {
  if (!myName) { showToast("이름을 먼저 선택하세요!"); return; }
  myTools = myTools.includes(tool) ? myTools.filter(t=>t!==tool) : [...myTools, tool];
  renderTools();
}

async function submitStatus(type) {
  if (!myName) { showToast("이름을 선택하세요!"); return; }
  const btn = document.getElementById(type === '출고' ? "submitBtn" : "returnBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>처리 중...';
  try {
    fetch(GAS_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ name: myName, tools: myTools, type: type })
    });
    boardData[myName] = [...myTools];
    renderBoard();
    showToast(`✅ ${myName} ${type} 완료!`);
  } catch(e) { showToast("❌ 처리 실패."); }
  btn.disabled = false;
  btn.innerHTML = type === '출고' ? "📤 출고" : "📥 반납";
}

async function loadStatus() {
  try {
    const res = await fetch(GAS_URL + "?action=get");
    const data = await res.json();
    boardData = data;
    if (myName) myTools = [...(boardData[myName] || [])];
    renderTools();
    renderBoard();
  } catch(e) {
    document.getElementById("statusBoard").innerHTML = '<div class="loading">⚠️ 데이터를 불러올 수 없습니다.</div>';
  }
}

function renderBoard() {
  document.getElementById("statusBoard").innerHTML = ALL_MEMBERS.map(m => {
    const tools = boardData[m] || [];
    return `
      <div class="member-row">
        <div class="avatar">${m.charAt(0)}</div>
        <div style="flex:1;">
          <div class="member-name">${m}</div>
          <div class="tool-tags">
            ${tools.length ? tools.map(t=>`<span class="tool-tag">${t}</span>`).join("") : '<span class="no-tool">사용 중인 툴 없음</span>'}
          </div>
        </div>
      </div>`;
  }).join("");
}

async function resetMyStatus() {
  if (!myName) { showToast("이름을 먼저 선택하세요!"); return; }
  if (!confirm(`${myName}의 상태를 초기화할까요?`)) return;
  myTools = [];
  renderTools();
  fetch(GAS_URL, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ name: myName, tools: [] })
  });
  boardData[myName] = [];
  renderBoard();
  showToast(`🔄 ${myName} 초기화 완료`);
}

async function loadLog() {
  document.getElementById('logBoard').innerHTML = '<div class="log-empty"><span class="spinner"></span> 불러오는 중...</div>';
  try {
    const res = await fetch(GAS_URL + "?action=log");
    const data = await res.json();
    if (!data.logs || data.logs.length === 0) {
      document.getElementById('logBoard').innerHTML = '<div class="log-empty">아직 기록이 없습니다</div>';
      return;
    }
    const rows = [...data.logs].slice(0, 500).map(row => {
      const dateStr = row[0] ? new Date(row[0]).toLocaleString("ko-KR", {timeZone:"Asia/Seoul"}) : "-";
      const tools = row[2] && row[2] !== '없음'
        ? row[2].split(', ').map(t => `<span class="log-tool-tag">${t}</span>`).join('')
        : '<span style="color:#bbb">없음</span>';
      const typeLabel = row[3] === '출고'
        ? `<span style="background:#e6f7f4;color:#0d7c6e;border-radius:100px;padding:2px 10px;font-size:0.8rem;font-weight:700">📤 출고</span>`
        : row[3] === '반납'
        ? `<span style="background:#fff0f0;color:#e53e3e;border-radius:100px;padding:2px 10px;font-size:0.8rem;font-weight:700">📥 반납</span>`
        : `<span style="color:#bbb">-</span>`;
      return `<tr><td style="white-space:nowrap">${dateStr}</td><td><strong>${row[1]}</strong></td><td>${typeLabel}</td><td>${tools}</td></tr>`;
    }).join('');
    document.getElementById('logBoard').innerHTML = `
      <div style="overflow-x:auto">
      <table class="log-table">
        <thead><tr><th>시간</th><th>이름</th><th>구분</th><th>사용 툴</th></tr></thead>

        <tbody>${rows}</tbody>
      </table></div>`;
  } catch(e) {
    document.getElementById('logBoard').innerHTML = '<div class="log-empty">❌ 로그를 불러올 수 없습니다</div>';
  }
}

function selectToolTab(tool) {
  currentToolTab = tool;
  document.querySelectorAll('[id^="tab-"]').forEach(b => b.classList.remove('selected'));
  document.getElementById('tab-' + tool).classList.add('selected');
  renderToolInfo();
}

function getExpiryClass(dateStr) {
  if (!dateStr || dateStr === '-') return '';
  const parts = dateStr.split('.');
  if (parts.length < 3) return '';
  const expiry = new Date(parts[0], parts[1]-1, parts[2]);
  const now = new Date();
  const diff = (expiry - now) / (1000 * 60 * 60 * 24);
  if (diff < 0) return 'expired';
  if (diff < 90) return 'expiring-soon';
  return 'valid';
}

function renderToolInfo() {
  const items = TOOL_INFO[currentToolTab] || [];
  if (items.length === 0) {
    document.getElementById('toolInfoBoard').innerHTML = '<div class="log-empty">정보가 없습니다</div>';
    return;
  }
  const rows = items.map(item => {
    const cls = getExpiryClass(item.유효기간);
    return `<tr>
      <td>${item.name}</td>
      <td>${item.sn}</td>
      <td>${item.교정일}</td>
      <td class="${cls}">${item.유효기간}</td>
    </tr>`;
  }).join('');
  document.getElementById('toolInfoBoard').innerHTML = `
    <div style="overflow-x:auto">
    <table class="info-table">
      <thead><tr><th>시험장비명</th><th>S/N (ID)</th><th>교정일자</th><th>유효기간</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function updateTime() {
  document.getElementById("currentTime").textContent =
    new Date().toLocaleDateString("ko-KR") + " " + new Date().toLocaleTimeString("ko-KR");
}

setInterval(loadStatus, 30000);
setInterval(updateTime, 1000);
renderNames();
renderTools();
loadStatus();
updateTime();
</script>
</body>
</html>
